services:
  # Backend Service (Node.js)
  - type: web
    name: devtrack-backend
    runtime: node
    rootDir: devtrack-server
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5003
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: REDIS_URL
        sync: false # Set this manually in Render if you have an existing Redis

  # Frontend Service (Static Site)
  - type: web
    name: devtrack-frontend
    env: static
    rootDir: devtrack-client
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false
